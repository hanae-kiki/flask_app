name: Docker CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.OKLLLK }}      # ← Votre secret réel
        password: ${{ secrets.DOCKER_PASSWORD }}

    - run: docker build -t oklllk/flask-app:v2 .
    - run: docker push oklllk/flask-app:v2