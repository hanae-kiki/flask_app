name: Docker CI Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # oklllk
        password: ${{ secrets.DOCKER_PASSWORD }}  # dckr_pat_...

    - name: Build Docker image
      run: docker build -t oklllk/flask-app:v2 .

    - name: Push Docker image
      run: docker push oklllk/flask-app:v2